<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Humboldt County Map</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"/>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
    #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; }
    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.92); padding: 1.5rem 2rem;
      border: 1px solid #ccc; border-radius: 4px; z-index: 9999;
      font-size: 1rem; color: #333; text-align: center;
    }
    .info-panel {
      padding: 8px 12px;
      background: rgba(255,255,255,0.92);
      border: 1px solid #ccc;
      border-radius: 2px;
      font-size: 0.82rem;
      line-height: 1.5;
      max-width: 240px;
    }
    .info-panel h4 { margin: 0 0 4px; font-size: 0.9rem; color: #14503f; }
    .legend { line-height: 1.6; }
    .legend i {
      width: 14px; height: 14px; display: inline-block;
      margin-right: 6px; vertical-align: middle; opacity: 0.8;
    }
  </style>
</head>
<body>

<div id="loading">Loading map data&hellip;</div>
<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
<script>
// Humboldt County center and bounds
const HUMBOLDT_CENTER = [40.745, -123.87];
const HUMBOLDT_ZOOM = 9;
const HUMBOLDT_BOUNDS = [[40.001, -124.407], [41.465, -123.435]];

// Init map with canvas renderer for performance
const map = L.map('map', {
  center: HUMBOLDT_CENTER,
  zoom: HUMBOLDT_ZOOM,
  preferCanvas: true,
  maxBounds: HUMBOLDT_BOUNDS,
  maxBoundsViscosity: 0.7
});

// Basemap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 18
}).addTo(map);

// Layer style functions
function broadbandStyle(feature) {
  const tech = feature.properties.TechCode;
  const colors = { 70: '#9b59b6', 50: '#3498db', 40: '#2ecc71', 10: '#e74c3c' };
  const color = colors[tech] || '#95a5a6';
  return { color: color, weight: 0.8, fillColor: color, fillOpacity: 0.25 };
}

function parcelStyle() {
  return { color: '#1a6b55', weight: 1, fillColor: '#eaf2ef', fillOpacity: 0.5 };
}

function parcelHoverStyle() {
  return { color: '#14503f', weight: 2, fillColor: '#b8ddd3', fillOpacity: 0.7 };
}

function infraStyle() {
  return { color: '#e67e22', weight: 1.5, fillColor: 'none', fillOpacity: 0 };
}

// Popup builders
function broadbandPopup(props) {
  const techNames = { 70: 'LTE / Mobile Broadband', 50: 'Cable', 40: 'DSL', 10: 'Fiber' };
  return `<div class="info-panel">
    <h4>Broadband Coverage</h4>
    <b>Provider:</b> ${props.DBA || 'N/A'}<br>
    <b>Technology:</b> ${techNames[props.TechCode] || 'Code ' + props.TechCode}<br>
    <b>Households:</b> ${props.SUM_HH2020 ? props.SUM_HH2020.toLocaleString() : 'N/A'}<br>
    <b>Purple zone:</b> ${props.PURPLEZONE ? 'Yes' : 'No'}
  </div>`;
}

function parcelPopup(props) {
  const rows = [
    ['APN', props.APN],
    ['Address', props.ADDRESS],
    ['Description', props.DESCRIPTIO],
    ['Acres', props.ACRES ? Number(props.ACRES).toFixed(2) : null],
    ['Land Use', props['LAND USE']],
    ['Zoning', props.ZONING],
    ['For Sale?', props['FOR SALE?']],
    ['Sale Price', props['SALE PRICE ($)'] ? '$' + Number(props['SALE PRICE ($)']).toLocaleString() : null],
    ['For Lease?', props['FOR LEASE?']],
  ].filter(([_, v]) => v && v !== 'nan' && v !== 'None' && String(v).trim() !== '');
  const html = rows.map(([k, v]) => `<b>${k}:</b> ${v}`).join('<br>');
  return `<div class="info-panel"><h4>Parcel</h4>${html}</div>`;
}

function infraPopup(props) {
  return `<div class="info-panel">
    <h4>Infrastructure</h4>
    <b>Type:</b> ${props.TYPE || 'N/A'}<br>
    <b>Owner:</b> ${props.OWNER || 'N/A'}<br>
    <b>Voltage:</b> ${props.VOLTAGE || 'N/A'} (${props.VOLT_CLASS || ''})<br>
    <b>Status:</b> ${props.STATUS || 'N/A'}
  </div>`;
}

// Layer groups
const broadbandLayer = L.geoJSON(null, {
  renderer: L.canvas(),
  style: broadbandStyle,
  onEachFeature: (f, layer) => layer.bindPopup(broadbandPopup(f.properties))
});

const parcelLayer = L.geoJSON(null, {
  renderer: L.canvas(),
  style: parcelStyle,
  onEachFeature: (f, layer) => {
    layer.bindPopup(parcelPopup(f.properties));
    layer.on('mouseover', function() { this.setStyle(parcelHoverStyle()); });
    layer.on('mouseout', function() { parcelLayer.resetStyle(this); });
  }
});

const infraLayer = L.geoJSON(null, {
  renderer: L.canvas(),
  style: infraStyle,
  onEachFeature: (f, layer) => layer.bindPopup(infraPopup(f.properties))
});

// Load all layers async in parallel
const loading = document.getElementById('loading');
Promise.all([
  fetch('layer_1.geojson').then(r => r.json()).then(d => { broadbandLayer.addData(d); broadbandLayer.addTo(map); }),
  fetch('layer_2.geojson').then(r => r.json()).then(d => { parcelLayer.addData(d); parcelLayer.addTo(map); }),
  fetch('layer_3.geojson').then(r => r.json()).then(d => { infraLayer.addData(d); infraLayer.addTo(map); }),
]).then(() => {
  loading.style.display = 'none';
}).catch(err => {
  loading.textContent = 'Error loading data. Try opening via a local server.';
  console.error(err);
});

// Layer control
const overlays = {
  'Broadband Coverage': broadbandLayer,
  'Parcels': parcelLayer,
  'Infrastructure': infraLayer
};
L.control.layers(null, overlays, { collapsed: false }).addTo(map);

// Legend
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'info-panel legend');
  div.innerHTML = `<h4>Broadband Tech</h4>
    <i style="background:#9b59b6"></i> LTE / Mobile<br>
    <i style="background:#3498db"></i> Cable<br>
    <i style="background:#2ecc71"></i> DSL<br>
    <i style="background:#e74c3c"></i> Fiber<br>
    <i style="background:#95a5a6"></i> Other<br>
    <hr style="margin:6px 0">
    <i style="background:#1a6b55"></i> Parcel<br>
    <i style="background:#e67e22"></i> Infrastructure`;
  return div;
};
legend.addTo(map);
</script>
</body>
</html>
